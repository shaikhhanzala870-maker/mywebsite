<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match-3 Puzzle Game</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #111827, #1e3a8a, #6d28d9);
      overflow: hidden;
    }

    .game-container {
      text-align: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      color: white;
      margin-bottom: 15px;
      font-size: 2.5rem;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 70px);
      grid-template-rows: repeat(8, 70px);
      gap: 5px;
      justify-content: center;
    }

    .tile {
      width: 70px;
      height: 70px;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .tile:hover {
      transform: scale(1.05);
    }

    .selected {
      border: 3px solid #fff;
      box-shadow: 0 0 15px white;
    }

    .hidden {
      opacity: 0;
      transform: scale(0);
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      z-index: 100;
      display: none;
    }

    .game-over h2 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .game-over p {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    @media (max-width: 700px) {
      .board {
        grid-template-columns: repeat(8, 42px);
        grid-template-rows: repeat(8, 42px);
      }

      .tile {
        width: 42px;
        height: 42px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>

  <div class="game-container">
    <h1>🍬 Match-3 Puzzle</h1>

    <div class="stats">
      <div>⭐ Score: <span id="score">0</span></div>
      <div>🎯 Moves: <span id="moves">30</span></div>
    </div>

    <div class="board" id="board"></div>

    <button onclick="restartGame()">Restart Game</button>
  </div>

  <div class="game-over" id="gameOver">
    <h2>Game Over</h2>
    <p>Your Score: <span id="finalScore"></span></p>
    <button onclick="restartGame()">Play Again</button>
  </div>

<script>
/*
====================================================
MATCH-3 PUZZLE GAME
Built with Vanilla JavaScript
====================================================
You can easily replace emojis with:
- Images
- SVGs
- Custom sprites
====================================================
*/

const board = document.getElementById("board");

const width = 8;
const totalMoves = 30;

let score = 0;
let moves = totalMoves;

const scoreDisplay = document.getElementById("score");
const movesDisplay = document.getElementById("moves");

/*
====================================================
ITEM TYPES
Replace emojis later with image paths or CSS classes
====================================================
*/

const candies = [
  { emoji: "🍒", color: "#ef4444" },
  { emoji: "🍋", color: "#facc15" },
  { emoji: "🍇", color: "#8b5cf6" },
  { emoji: "🍏", color: "#22c55e" },
  { emoji: "🫐", color: "#3b82f6" },
  { emoji: "🍊", color: "#f97316" }
];

let squares = [];
let selectedSquare = null;
let isAnimating = false;

/*
====================================================
CREATE BOARD
====================================================
*/

function createBoard() {
  board.innerHTML = "";
  squares = [];

  for (let i = 0; i < width * width; i++) {

    const tile = document.createElement("div");
    tile.classList.add("tile");

    const randomCandy =
      candies[Math.floor(Math.random() * candies.length)];

    tile.dataset.type = randomCandy.emoji;
    tile.textContent = randomCandy.emoji;
    tile.style.background = randomCandy.color;

    tile.setAttribute("draggable", true);
    tile.setAttribute("data-id", i);

    board.appendChild(tile);
    squares.push(tile);
  }

  removeStartingMatches();
  addEvents();
}

/*
====================================================
REMOVE STARTING MATCHES
====================================================
*/

function removeStartingMatches() {
  let hasMatch = true;

  while (hasMatch) {
    hasMatch = false;

    for (let i = 0; i < squares.length; i++) {
      const matches = getMatchAt(i);

      if (matches.length >= 3) {
        hasMatch = true;

        matches.forEach(index => {
          const randomCandy =
            candies[Math.floor(Math.random() * candies.length)];

          squares[index].dataset.type = randomCandy.emoji;
          squares[index].textContent = randomCandy.emoji;
          squares[index].style.background = randomCandy.color;
        });
      }
    }
  }
}

/*
====================================================
EVENTS
====================================================
*/

function addEvents() {

  squares.forEach(square => {

    square.addEventListener("click", () => {
      handleClick(square);
    });

    // Drag support
    square.addEventListener("dragstart", dragStart);
    square.addEventListener("dragover", e => e.preventDefault());
    square.addEventListener("drop", dragDrop);
  });
}

/*
====================================================
CLICK SWAP
====================================================
*/

function handleClick(square) {

  if (isAnimating || moves <= 0) return;

  if (!selectedSquare) {
    selectedSquare = square;
    square.classList.add("selected");
    return;
  }

  const firstId = parseInt(selectedSquare.dataset.id);
  const secondId = parseInt(square.dataset.id);

  if (isAdjacent(firstId, secondId)) {
    swapTiles(selectedSquare, square);
  }

  selectedSquare.classList.remove("selected");
  selectedSquare = null;
}

/*
====================================================
DRAG SUPPORT
====================================================
*/

let draggedSquare = null;

function dragStart() {
  draggedSquare = this;
}

function dragDrop() {
  if (isAnimating || moves <= 0) return;

  const from = parseInt(draggedSquare.dataset.id);
  const to = parseInt(this.dataset.id);

  if (isAdjacent(from, to)) {
    swapTiles(draggedSquare, this);
  }
}

/*
====================================================
CHECK ADJACENCY
====================================================
*/

function isAdjacent(a, b) {
  return (
    b === a - 1 ||
    b === a + 1 ||
    b === a - width ||
    b === a + width
  );
}

/*
====================================================
SWAP LOGIC
====================================================
*/

async function swapTiles(square1, square2) {

  if (isAnimating) return;

  isAnimating = true;

  const tempType = square1.dataset.type;
  const tempText = square1.textContent;
  const tempBg = square1.style.background;

  square1.dataset.type = square2.dataset.type;
  square1.textContent = square2.textContent;
  square1.style.background = square2.style.background;

  square2.dataset.type = tempType;
  square2.textContent = tempText;
  square2.style.background = tempBg;

  const matches = findAllMatches();

  if (matches.length === 0) {
    // Swap back
    setTimeout(() => {

      const revertType = square1.dataset.type;
      const revertText = square1.textContent;
      const revertBg = square1.style.background;

      square1.dataset.type = square2.dataset.type;
      square1.textContent = square2.textContent;
      square1.style.background = square2.style.background;

      square2.dataset.type = revertType;
      square2.textContent = revertText;
      square2.style.background = revertBg;

      isAnimating = false;

    }, 250);

  } else {

    moves--;
    updateUI();

    await resolveBoard();

    isAnimating = false;

    if (moves <= 0) {
      endGame();
    }
  }
}

/*
====================================================
FIND MATCHES
====================================================
*/

function getMatchAt(index) {

  const matched = [];
  const type = squares[index].dataset.type;

  if (!type) return matched;

  // Horizontal
  let rowMatches = [index];

  let left = index - 1;
  while (
    left >= 0 &&
    Math.floor(left / width) === Math.floor(index / width) &&
    squares[left].dataset.type === type
  ) {
    rowMatches.push(left);
    left--;
  }

  let right = index + 1;
  while (
    right < 64 &&
    Math.floor(right / width) === Math.floor(index / width) &&
    squares[right].dataset.type === type
  ) {
    rowMatches.push(right);
    right++;
  }

  if (rowMatches.length >= 3) {
    matched.push(...rowMatches);
  }

  // Vertical
  let colMatches = [index];

  let up = index - width;
  while (
    up >= 0 &&
    squares[up].dataset.type === type
  ) {
    colMatches.push(up);
    up -= width;
  }

  let down = index + width;
  while (
    down < 64 &&
    squares[down].dataset.type === type
  ) {
    colMatches.push(down);
    down += width;
  }

  if (colMatches.length >= 3) {
    matched.push(...colMatches);
  }

  return [...new Set(matched)];
}

function findAllMatches() {

  const matched = new Set();

  for (let i = 0; i < squares.length; i++) {

    const matches = getMatchAt(i);

    matches.forEach(m => matched.add(m));
  }

  return [...matched];
}

/*
====================================================
RESOLVE BOARD
====================================================
*/

async function resolveBoard() {

  let matches = findAllMatches();

  while (matches.length > 0) {

    // Add score
    score += matches.length * 10;
    updateUI();

    // Remove matches
    matches.forEach(index => {
      squares[index].dataset.type = "";
      squares[index].textContent = "";
      squares[index].style.background = "transparent";
      squares[index].classList.add("hidden");
    });

    await sleep(250);

    applyGravity();

    await sleep(250);

    matches = findAllMatches();
  }
}

/*
====================================================
GRAVITY
====================================================
*/

function applyGravity() {

  for (let col = 0; col < width; col++) {

    let column = [];

    // Collect non-empty
    for (let row = width - 1; row >= 0; row--) {

      const index = row * width + col;

      if (squares[index].dataset.type !== "") {

        column.push({
          type: squares[index].dataset.type,
          text: squares[index].textContent,
          bg: squares[index].style.background
        });
      }
    }

    // Fill column bottom-up
    for (let row = width - 1; row >= 0; row--) {

      const index = row * width + col;

      if (column.length > 0) {

        const candy = column.shift();

        squares[index].dataset.type = candy.type;
        squares[index].textContent = candy.text;
        squares[index].style.background = candy.bg;
        squares[index].classList.remove("hidden");

      } else {

        const randomCandy =
          candies[Math.floor(Math.random() * candies.length)];

        squares[index].dataset.type = randomCandy.emoji;
        squares[index].textContent = randomCandy.emoji;
        squares[index].style.background = randomCandy.color;
        squares[index].classList.remove("hidden");
      }
    }
  }
}

/*
====================================================
UI
====================================================
*/

function updateUI() {
  scoreDisplay.textContent = score;
  movesDisplay.textContent = moves;
}

/*
====================================================
GAME OVER
====================================================
*/

function endGame() {

  document.getElementById("finalScore").textContent = score;

  document.getElementById("gameOver").style.display = "flex";
}

/*
====================================================
RESTART
====================================================
*/

function restartGame() {

  score = 0;
  moves = totalMoves;

  updateUI();

  document.getElementById("gameOver").style.display = "none";

  createBoard();
}

/*
====================================================
HELPER
====================================================
*/

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/*
====================================================
START GAME
====================================================
*/

createBoard();

</script>

</body>
</html>
