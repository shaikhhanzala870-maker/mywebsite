<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Subway Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            z-index: 20;
        }
        #gameOver h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            color: #e74c3c;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .instructions {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="instructions">Use Left and Right Arrow Keys to Move</div>
    
    <div id="gameOver">
        <h1>Game Over!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('gameOver');
    const finalScoreElement = document.getElementById('finalScore');

    // Game Variables
    let animationId;
    let score = 0;
    let gameSpeed = 5;
    let frameCount = 0;
    let isGameOver = false;

    // Lanes setup (3 lanes)
    const laneWidth = canvas.width / 3;
    const lanes = [laneWidth / 2, laneWidth * 1.5, laneWidth * 2.5];
    let currentLane = 1; // Start in middle lane (0, 1, 2)

    // Player Object
    const player = {
        y: canvas.height - 100,
        width: 50,
        height: 70,
        color: '#2ecc71',
        draw() {
            ctx.fillStyle = this.color;
            // Center the player in the current lane
            const x = lanes[currentLane] - (this.width / 2);
            ctx.fillRect(x, this.y, this.width, this.height);
        }
    };

    // Obstacles Array
    let obstacles = [];

    class Obstacle {
        constructor() {
            this.lane = Math.floor(Math.random() * 3);
            this.width = 60;
            this.height = 60;
            this.x = lanes[this.lane] - (this.width / 2);
            this.y = -this.height;
            this.color = '#e74c3c';
        }

        update() {
            this.y += gameSpeed;
            this.draw();
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (isGameOver) return;
        
        if (e.key === 'ArrowLeft' && currentLane > 0) {
            currentLane--;
        } else if (e.key === 'ArrowRight' && currentLane < 2) {
            currentLane++;
        }
    });

    // Touch support for mobile
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });
    canvas.addEventListener('touchend', e => {
        if (isGameOver) return;
        let touchEndX = e.changedTouches[0].screenX;
        if (touchEndX < touchStartX - 30 && currentLane > 0) {
            currentLane--; // Swipe left
        } else if (touchEndX > touchStartX + 30 && currentLane < 2) {
            currentLane++; // Swipe right
        }
    });

    function spawnObstacles() {
        // Spawn rate increases slightly as game speeds up
        if (frameCount % Math.max(30, Math.floor(100 - gameSpeed * 2)) === 0) {
            obstacles.push(new Obstacle());
        }
    }

    function checkCollision(obstacle) {
        const playerX = lanes[currentLane] - (player.width / 2);
        
        if (
            playerX < obstacle.x + obstacle.width &&
            playerX + player.width > obstacle.x &&
            player.y < obstacle.y + obstacle.height &&
            player.y + player.height > obstacle.y
        ) {
            gameOver();
        }
    }

    function drawBackgroundLanes() {
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(laneWidth - 2, 0, 4, canvas.height); // Left divider
        ctx.fillRect(laneWidth * 2 - 2, 0, 4, canvas.height); // Right divider
        
        // Moving track lines
        ctx.fillStyle = '#bdc3c7';
        for(let i = 0; i < canvas.height; i += 60) {
            let offset = (frameCount * gameSpeed) % 60;
            ctx.fillRect(laneWidth - 4, i + offset - 60, 8, 30);
            ctx.fillRect(laneWidth * 2 - 4, i + offset - 60, 8, 30);
        }
    }

    function gameOver() {
        isGameOver = true;
        cancelAnimationFrame(animationId);
        gameOverScreen.style.display = 'flex';
        finalScoreElement.innerText = Math.floor(score);
    }

    function resetGame() {
        score = 0;
        gameSpeed = 5;
        frameCount = 0;
        obstacles = [];
        currentLane = 1;
        isGameOver = false;
        gameOverScreen.style.display = 'none';
        scoreElement.innerText = '0';
        animate();
    }

    function animate() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackgroundLanes();
        player.draw();
        spawnObstacles();

        // Update and draw obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            checkCollision(obstacles[i]);

            // Remove off-screen obstacles and increase score
            if (obstacles[i].y > canvas.height) {
                obstacles.splice(i, 1);
            }
        }

        // Score and difficulty scaling
        score += 0.1;
        scoreElement.innerText = Math.floor(score);
        
        if (frameCount % 600 === 0) { // Every ~10 seconds
            gameSpeed += 0.5; // Gradually increase speed
        }

        frameCount++;
        animationId = requestAnimationFrame(animate);
    }

    // Start Game
    animate();
</script>

</body>
</html>
