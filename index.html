<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate IPL Fan Tester 😂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #ddd;
        }

        .button-container {
            display: flex;
            gap: 30px;
        }

        button {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .csk-btn {
            background: linear-gradient(45deg, #F9CD05, #FFD700);
            color: #000;
            border: 3px solid #00529B;
        }

        .csk-btn:hover {
            box-shadow: 0 10px 30px rgba(249, 205, 5, 0.6);
        }

        .rcb-btn {
            background: linear-gradient(45deg, #E32636, #8B0000);
            color: #FFD700;
            border: 3px solid #000;
        }

        .rcb-btn:hover {
            box-shadow: 0 10px 30px rgba(227, 38, 54, 0.6);
        }

        /* Modal Styles */
        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #emoji-display {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #message-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            padding: 0 20px;
            text-align: center;
        }

        .close-btn {
            padding: 10px 30px;
            font-size: 1.2rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .spin {
            animation: spin 3s linear infinite;
        }

        .swing {
            animation: swing 2s ease-in-out infinite alternate;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes swing { 
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(20deg); }
        }
    </style>
</head>
<body>

    <h1>🏏 The Ultimate Fan Reward 🏏</h1>
    <p>Choose your favorite team to claim your ultimate prize!</p>

    <div class="button-container">
        <button class="csk-btn" onclick="showResult('csk')">💛 I am a CSK Fan</button>
        <button class="rcb-btn" onclick="showResult('rcb')">❤️ I am an RCB Fan</button>
    </div>

    <!-- Hidden Popup Modal -->
    <div id="result-modal">
        <div id="emoji-display"></div>
        <div id="message-display"></div>
        <button class="close-btn" onclick="closeModal()">Play Again 🔄</button>
    </div>

    <script>
        function showResult(team) {
            const modal = document.getElementById('result-modal');
            const emoji = document.getElementById('emoji-display');
            const message = document.getElementById('message-display');

            if (team === 'csk') {
                emoji.innerHTML = "🍭";
                emoji.className = "swing"; // Gives the lollipop a swinging animation
                message.innerHTML = "Aww! 5 Trophies bohot ho gayi...<br>Ab chup chaap ye Lollipop khao! 🤣";
                message.style.color = "#F9CD05";
            } else if (team === 'rcb') {
                emoji.innerHTML = "🏆";
                emoji.className = "spin"; // Gives the trophy a glowing spin animation
                message.innerHTML = "EE SALA CUP NAMDE! 😭❤️<br>Lo bhai, finally ek virtual trophy toh mil hi gayi! 🎉";
                message.style.color = "#E32636";
            }

            modal.style.display = "flex";
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            modal.style.display = "none";
        }
    </script>
</body>
</html>
