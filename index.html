<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Match 3 Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    user-select:none;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#7e22ce);
    overflow:hidden;
}

.game-container{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
    font-size:2.5rem;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    gap:20px;
}

.stat-box{
    background:rgba(255,255,255,0.12);
    padding:12px 18px;
    border-radius:15px;
    color:white;
    font-size:1.1rem;
    font-weight:bold;
    min-width:130px;
}

.board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    gap:6px;
}

.tile{
    width:70px;
    height:70px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    cursor:pointer;
    transition:
        transform 0.18s ease,
        opacity 0.2s ease,
        background 0.2s ease;
    border:2px solid rgba(255,255,255,0.12);
}

.tile:hover{
    transform:scale(1.05);
}

.selected{
    border:3px solid white;
    box-shadow:0 0 15px white;
    transform:scale(1.1);
}

button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:scale(1.05);
    background:#16a34a;
}

.game-over{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.game-over h2{
    color:white;
    font-size:3rem;
    margin-bottom:15px;
}

.game-over p{
    color:white;
    font-size:1.4rem;
    margin-bottom:20px;
}

@media(max-width:750px){

    .board{
        grid-template-columns:repeat(8,42px);
        grid-template-rows:repeat(8,42px);
        gap:4px;
    }

    .tile{
        width:42px;
        height:42px;
        font-size:1.2rem;
        border-radius:10px;
    }

    h1{
        font-size:2rem;
    }

    .stat-box{
        min-width:auto;
        font-size:0.9rem;
    }
}
</style>
</head>

<body>

<div class="game-container">

    <h1>🍬 Match 3 Puzzle</h1>

    <div class="stats">
        <div class="stat-box">
            ⭐ Score: <span id="score">0</span>
        </div>

        <div class="stat-box">
            🎯 Moves: <span id="moves">30</span>
        </div>
    </div>

    <div class="board" id="board"></div>

    <button onclick="restartGame()">Restart Game</button>

</div>

<div class="game-over" id="gameOver">
    <h2>Game Over</h2>
    <p>Your Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>

/*
=========================================
MATCH 3 GAME
HTML + CSS + VANILLA JS
=========================================
*/

const width = 8;
const totalMoves = 30;

const board = document.getElementById("board");
const scoreDisplay = document.getElementById("score");
const movesDisplay = document.getElementById("moves");

let score = 0;
let moves = totalMoves;

let squares = [];
let selectedTile = null;
let isAnimating = false;

/*
=========================================
GAME ITEMS
Replace emojis later with:
- Images
- SVG
- Sprites
=========================================
*/

const items = [
    {emoji:"🍒", color:"#ef4444"},
    {emoji:"🍋", color:"#facc15"},
    {emoji:"🍇", color:"#8b5cf6"},
    {emoji:"🍏", color:"#22c55e"},
    {emoji:"🫐", color:"#3b82f6"},
    {emoji:"🍊", color:"#fb923c"}
];

/*
=========================================
CREATE BOARD
=========================================
*/

function createBoard(){

    board.innerHTML = "";
    squares = [];

    for(let i=0;i<width*width;i++){

        const tile = document.createElement("div");
        tile.classList.add("tile");

        const randomItem =
            items[Math.floor(Math.random()*items.length)];

        tile.dataset.type = randomItem.emoji;
        tile.textContent = randomItem.emoji;
        tile.style.background = randomItem.color;

        tile.dataset.id = i;

        tile.addEventListener("click", ()=>handleTileClick(tile));

        board.appendChild(tile);
        squares.push(tile);
    }

    removeStartingMatches();
}

/*
=========================================
REMOVE STARTING MATCHES
=========================================
*/

function removeStartingMatches(){

    let found = true;

    while(found){

        found = false;

        for(let i=0;i<squares.length;i++){

            const matches = getMatchAt(i);

            if(matches.length >= 3){

                found = true;

                matches.forEach(index=>{

                    const randomItem =
                        items[Math.floor(Math.random()*items.length)];

                    squares[index].dataset.type = randomItem.emoji;
                    squares[index].textContent = randomItem.emoji;
                    squares[index].style.background = randomItem.color;
                });
            }
        }
    }
}

/*
=========================================
CLICK TO SWAP
=========================================
*/

function handleTileClick(tile){

    if(isAnimating || moves <= 0) return;

    // First select
    if(!selectedTile){

        selectedTile = tile;
        tile.classList.add("selected");
        return;
    }

    // Click same tile again
    if(selectedTile === tile){

        selectedTile.classList.remove("selected");
        selectedTile = null;
        return;
    }

    const first = parseInt(selectedTile.dataset.id);
    const second = parseInt(tile.dataset.id);

    // Only adjacent
    if(isAdjacent(first, second)){

        swapTiles(selectedTile, tile);

    }else{

        // Select new tile
        selectedTile.classList.remove("selected");
        selectedTile = tile;
        tile.classList.add("selected");
        return;
    }

    selectedTile.classList.remove("selected");
    selectedTile = null;
}

/*
=========================================
CHECK ADJACENT
=========================================
*/

function isAdjacent(a,b){

    return (
        b === a-1 ||
        b === a+1 ||
        b === a-width ||
        b === a+width
    );
}

/*
=========================================
SWAP TILES
=========================================
*/

async function swapTiles(tile1, tile2){

    if(isAnimating) return;

    isAnimating = true;

    // Animation
    tile1.style.transform = "scale(1.2)";
    tile2.style.transform = "scale(1.2)";

    await sleep(120);

    tile1.style.transform = "";
    tile2.style.transform = "";

    // Swap data
    swapData(tile1, tile2);

    const matches = findAllMatches();

    // Invalid move
    if(matches.length === 0){

        await sleep(200);

        swapData(tile1, tile2);

        isAnimating = false;
        return;
    }

    moves--;
    updateUI();

    await resolveBoard();

    isAnimating = false;

    if(moves <= 0){
        endGame();
    }
}

/*
=========================================
SWAP DATA
=========================================
*/

function swapData(a,b){

    const tempType = a.dataset.type;
    const tempText = a.textContent;
    const tempBg = a.style.background;

    a.dataset.type = b.dataset.type;
    a.textContent = b.textContent;
    a.style.background = b.style.background;

    b.dataset.type = tempType;
    b.textContent = tempText;
    b.style.background = tempBg;
}

/*
=========================================
GET MATCHES
=========================================
*/

function getMatchAt(index){

    const matched = [];
    const type = squares[index].dataset.type;

    if(!type) return matched;

    /*
    HORIZONTAL
    */

    let horizontal = [index];

    let left = index - 1;

    while(
        left >= 0 &&
        Math.floor(left/width) === Math.floor(index/width) &&
        squares[left].dataset.type === type
    ){
        horizontal.push(left);
        left--;
    }

    let right = index + 1;

    while(
        right < 64 &&
        Math.floor(right/width) === Math.floor(index/width) &&
        squares[right].dataset.type === type
    ){
        horizontal.push(right);
        right++;
    }

    if(horizontal.length >= 3){
        matched.push(...horizontal);
    }

    /*
    VERTICAL
    */

    let vertical = [index];

    let up = index - width;

    while(
        up >= 0 &&
        squares[up].dataset.type === type
    ){
        vertical.push(up);
        up -= width;
    }

    let down = index + width;

    while(
        down < 64 &&
        squares[down].dataset.type === type
    ){
        vertical.push(down);
        down += width;
    }

    if(vertical.length >= 3){
        matched.push(...vertical);
    }

    return [...new Set(matched)];
}

/*
=========================================
FIND ALL MATCHES
=========================================
*/

function findAllMatches(){

    const matched = new Set();

    for(let i=0;i<squares.length;i++){

        const matches = getMatchAt(i);

        matches.forEach(m=>matched.add(m));
    }

    return [...matched];
}

/*
=========================================
RESOLVE BOARD
=========================================
*/

async function resolveBoard(){

    let matches = findAllMatches();

    while(matches.length > 0){

        score += matches.length * 10;
        updateUI();

        // Remove matches
        matches.forEach(index=>{

            squares[index].style.opacity = "0";
            squares[index].dataset.type = "";
        });

        await sleep(250);

        applyGravity();

        await sleep(250);

        matches = findAllMatches();
    }
}

/*
=========================================
GRAVITY
=========================================
*/

function applyGravity(){

    for(let col=0;col<width;col++){

        let column = [];

        // Collect non empty
        for(let row=width-1;row>=0;row--){

            const index = row*width + col;

            if(squares[index].dataset.type !== ""){

                column.push({
                    type:squares[index].dataset.type,
                    text:squares[index].textContent,
                    bg:squares[index].style.background
                });
            }
        }

        // Fill from bottom
        for(let row=width-1;row>=0;row--){

            const index = row*width + col;

            if(column.length > 0){

                const item = column.shift();

                squares[index].dataset.type = item.type;
                squares[index].textContent = item.text;
                squares[index].style.background = item.bg;
                squares[index].style.opacity = "1";

            }else{

                const randomItem =
                    items[Math.floor(Math.random()*items.length)];

                squares[index].dataset.type = randomItem.emoji;
                squares[index].textContent = randomItem.emoji;
                squares[index].style.background = randomItem.color;
                squares[index].style.opacity = "1";
            }
        }
    }
}

/*
=========================================
UPDATE UI
=========================================
*/

function updateUI(){

    scoreDisplay.textContent = score;
    movesDisplay.textContent = moves;
}

/*
=========================================
GAME OVER
=========================================
*/

function endGame(){

    document.getElementById("finalScore").textContent = score;

    document.getElementById("gameOver").style.display = "flex";
}

/*
=========================================
RESTART
=========================================
*/

function restartGame(){

    score = 0;
    moves = totalMoves;

    updateUI();

    document.getElementById("gameOver").style.display = "none";

    selectedTile = null;
    isAnimating = false;

    createBoard();
}

/*
=========================================
HELPER
=========================================
*/

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

/*
=========================================
START GAME
=========================================
*/

createBoard();

</script>

</body>
</html>
